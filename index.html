<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaArcade | 500+ Deep Sea Games</title>
    <style>
        /* Deep Sea Theme Styling & Bioluminescent Palettes */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body { 
            background-color: #020c1b; /* Abyssal Deep Blue */
            color: #e2f1ff; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Marine Navigation Bar */
        header { 
            background: linear-gradient(90deg, #031733 0%, #052654 100%);
            padding: 14px 24px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid #00f0ff; /* Neon Aqua Glow */
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 240, 255, 0.15);
        }
        .logo { 
            font-size: 1.6rem; 
            font-weight: 800; 
            color: #ffffff; 
            text-transform: lowercase;
            letter-spacing: 0.5px;
            text-shadow: 0 0 8px #00f0ff;
        }
        .logo span { color: #00f0ff; }
        .counter-badge { 
            background: linear-gradient(135deg, #00f0ff 0%, #0077b6 100%); 
            color: #020c1b;
            padding: 6px 14px; 
            border-radius: 20px; 
            font-size: 0.85rem; 
            font-weight: bold; 
            box-shadow: 0 0 12px #00f0ff; 
        }

        .app-layout { display: flex; width: 100%; flex-grow: 1; }
        
        /* Submarine Sidebar Navigation Dashboard */
        .sidebar { 
            width: 240px; 
            background-color: #031733; 
            padding: 20px 10px; 
            border-right: 1px solid #005f73; 
            height: calc(100vh - 61px); 
            position: sticky; 
            top: 61px; 
            overflow-y: auto; 
        }
        .sidebar-section-title { color: #0077b6; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; padding-left: 12px; margin: 15px 0 10px 0; letter-spacing: 1px; }
        .category-btn { display: flex; align-items: center; gap: 12px; width: 100%; text-align: left; padding: 11px 14px; background: transparent; border: none; color: #94d2bd; font-size: 0.95rem; font-weight: 600; cursor: pointer; border-radius: 20px; margin-bottom: 6px; transition: all 0.2s ease; }
        .category-btn:hover, .category-btn.active { background: rgba(0, 240, 255, 0.1); color: #ffffff; text-shadow: 0 0 5px #00f0ff; }
        .category-btn.active { border-left: 4px solid #00f0ff; border-radius: 0 20px 20px 0; background: rgba(0, 240, 255, 0.15); }

        /* Main Viewport Content Section */
        .content-container { flex-grow: 1; padding: 24px; max-width: 1400px; margin: 0 auto; width: calc(100% - 240px); }
        
        /* Premium Main Playback Block Terminal */
        .featured-frame { 
            background: linear-gradient(180deg, #031733 0%, #020c1b 100%);
            border-radius: 20px; 
            padding: 16px; 
            margin-bottom: 32px; 
            border: 2px solid #005f73;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .frame-title { font-size: 1.3rem; color: #ffffff; font-weight: 700; margin-bottom: 14px; text-shadow: 0 0 5px rgba(0,240,255,0.5); }
        
        .game-viewport { width: 100%; height: 480px; background-color: #010610; border-radius: 14px; overflow: hidden; position: relative; display: flex; justify-content: center; align-items: center; border: 1px solid #003f5c; }
        canvas { background-color: #021124; display: block; max-width: 100%; max-height: 100%; }
        
        .game-ui-overlay { position: absolute; top: 20px; left: 20px; pointer-events: none; font-family: monospace; font-size: 1.2rem; color: #00f0ff; text-shadow: 1px 1px 4px #000; z-index: 2; font-weight: bold; }
        .start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2, 12, 27, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5; }
        .start-btn { background: linear-gradient(135deg, #00f0ff 0%, #00a8cc 100%); color: #020c1b; border: none; padding: 16px 48px; font-size: 1.3rem; font-weight: 700; border-radius: 25px; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 15px #00f0ff; transition: all 0.2s ease; }
        .start-btn:hover { transform: scale(1.03); box-shadow: 0 0 25px #00f0ff; }
        .controls-hint { margin-top: 16px; font-size: 0.9rem; color: #94d2bd; text-align: center; }

        /* Dynamic Grid Framework Elements */
        .grid-title { font-size: 1.4rem; color: #ffffff; font-weight: 700; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #005f73; padding-bottom: 8px; }
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 14px; }
        
        .game-card { 
            background: #031733; 
            border-radius: 14px; 
            overflow: hidden; 
            cursor: pointer; 
            border: 1px solid #005f73; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            transition: all 0.2s ease; 
        }
        .game-card:hover { transform: translateY(-5px); border-color: #00f0ff; box-shadow: 0 5px 15px rgba(0, 240, 255, 0.3); z-index: 5; }
        .thumb-placeholder { width: 100%; height: 95px; background: #021124; display: flex; justify-content: center; align-items: center; font-size: 2.5rem; border-bottom: 1px solid #003f5c; }
        .game-info { padding: 10px; background: #031733; }
        .game-title { font-size: 0.8rem; font-weight: 700; color: #e2f1ff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .game-tag { display: inline-block; font-size: 0.6rem; background-color: #002b49; color: #00f0ff; padding: 2px 6px; border-radius: 10px; margin-top: 4px; font-weight: bold; border: 1px solid #005f73; }
    </style>
</head>
<body>

    <header>
        <div class="logo">aqua<span>arcade</span></div>

    <div class="app-layout">

                <div class="games-grid" id="mainGamesGrid"></div>
            </section>
        </main>
    </div>
