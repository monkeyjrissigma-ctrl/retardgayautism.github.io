<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ocean Arcade</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(#003d66, #001a33);
    color: #e0f7ff;
  }

  header {
    background: rgba(0, 40, 80, 0.8);
    padding: 20px;
    text-align: center;
    font-size: 2rem;
    font-weight: bold;
    color: #7fe3ff;
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
    position: sticky;
    top: 0;
  }

  .waves {
    width: 100%;
    height: 60px;
    background: url('https://i.imgur.com/AXo3qYk.png');
    background-size: cover;
  }

  main {
    padding: 20px;
    max-width: 1100px;
    margin: auto;
  }

  h2 {
    color: #9be8ff;
    margin-top: 40px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
  }

  .card {
    background: rgba(0, 60, 100, 0.6);
    border-radius: 12px;
    padding: 12px;
    box-shadow: 0 0 15px rgba(0,0,0,0.4);
    backdrop-filter: blur(4px);
  }

  .card-title {
    font-size: 1.2rem;
    font-weight: bold;
    color: #baf3ff;
  }

  .thumb {
    background: rgba(255,255,255,0.1);
    height: 140px;
    border-radius: 8px;
    margin-bottom: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #ccefff;
  }

  .play-btn {
    display: block;
    margin-top: 10px;
    padding: 8px;
    text-align: center;
    background: #00c8ff;
    color: #003344;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
  }

  .play-btn:hover {
    background: #00a4d6;
  }
</style>
</head>

<body>
<header>🌊 Ocean Arcade</header>
<div class="waves"></div>

<main>

  <h2>Featured Games</h2>
  <div class="grid">

    <div class="card">
      <div class="thumb">Dino Run</div>
      <div class="card-title">Dino Run</div>
      <a class="play-btn" href="games/dino-run/index.html" target="_blank">Play</a>
    </div>

    <div class="card">
      <div class="thumb">Space Shooter</div>
      <div class="card-title">Space Shooter</div>
      <a class="play-btn" href="games/space-shooter/index.html" target="_blank">Play</a>
    </div>

    <div class="card">
      <div class="thumb">2048</div>
      <div class="card-title">2048 Puzzle</div>
      <a class="play-btn" href="https://play2048.co/" target="_blank">Play</a>
    </div>

  </div>

  <h2>Chaos Mode (your silly category)</h2>
  <div class="grid">

    <div class="card">
      <div class="thumb">Weird Game</div>
      <div class="card-title">Weird Game</div>
      <a class="play-btn" href="#" target="_blank">Play</a>
    </div>

  </div>

</main>

</body>
</html>
