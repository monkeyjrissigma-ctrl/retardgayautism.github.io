<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>F1 Legends — Main Menu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      background: linear-gradient(#0a0a0f, #101018);
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden;
    }

    #menu-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-width: 600px;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
      color: #ff2a2a;
      text-shadow: 0 0 10px #ff0000;
    }

    .menu-box {
      background: rgba(255, 255, 255, 0.05);
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      backdrop-filter: blur(6px);
    }

    select, button {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      font-size: 1.1rem;
    }

    button {
      background: #ff2a2a;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #ff4444;
    }

    #contract-box {
      margin-top: 20px;
      padding: 15px;
      background: rgba(255,255,255,0.08);
      border-radius: 10px;
      display: none;
    }
  </style>
</head>
<body>

<div id="menu-container">
  <h1>F1 Legends</h1>

  <div class="menu-box">
    <h2>Select Track</h2>
    <select id="track-select"></select>
  </div>

  <div class="menu-box">
    <h2>Select Team</h2>
    <select id="team-select"></select>
  </div>

  <div id="contract-box">
    <h3>Team Contract</h3>
    <p id="contract-text"></p>
  </div>

  <button id="start-btn">Start Race</button>
</div>

<script src="js/save.js"></script>
<script src="js/menu.js"></script>

</body>
</html>
