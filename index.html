<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Stream Arcade | Play Free Games</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0b0c10; color: #c5c6c7; padding-bottom: 50px; }
        header { background-color: #1f2833; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #66fcf1; }
        .logo { font-size: 1.8rem; font-weight: bold; color: #66fcf1; text-transform: uppercase; letter-spacing: 2px; }
        .nav-links a { color: #c5c6c7; text-decoration: none; margin-left: 20px; font-weight: 600; }
        .nav-links a:hover { color: #66fcf1; }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .featured-section { background: linear-gradient(135deg, #1f2833 0%, #0b0c10 100%); border: 2px solid #45a29e; border-radius: 12px; padding: 20px; margin-bottom: 40px; }
        .section-title { font-size: 1.5rem; color: #66fcf1; margin-bottom: 15px; text-transform: uppercase; display: flex; align-items: center; gap: 10px; }
        .game-window { width: 100%; height: 450px; background-color: #000; border-radius: 8px; overflow: hidden; position: relative; display: flex; justify-content: center; align-items: center; }
        #gameCanvas { background-color: #111; display: block; }
        .game-ui-overlay { position: absolute; top: 15px; left: 15px; pointer-events: none; font-family: monospace; font-size: 1.2rem; color: #fff; text-shadow: 2px 2px 0px #000; z-index: 2; }
        .start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 12, 16, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5; }
        .start-btn { background-color: #66fcf1; color: #0b0c10; border: none; padding: 15px 40px; font-size: 1.3rem; font-weight: bold; border-radius: 30px; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 15px #66fcf1; }
        .start-btn:hover { transform: scale(1.05); }
        .controls-hint { margin-top: 15px; font-size: 0.9rem; color: #45a29e; text-align: center; }
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .game-card { background-color: #1f2833; border-radius: 8px; overflow: hidden; cursor: pointer; border: 1px solid #45a29e; position: relative; text-decoration: none; display: block; }
        .game-card:hover { border-color: #66fcf1; }
        .thumb-placeholder { width: 100%; height: 120px; background: #0b0c10; display: flex; justify-content: center; align-items: center; font-size: 2.5rem; }
        .game-info { padding: 10px; }
        .game-title { font-size: 0.95rem; font-weight: bold; color: #fff; }
        .game-tag { display: inline-block; font-size: 0.75rem; background-color: #45a29e; color: #0b0c10; padding: 2px 6px; border-radius: 4px; margin-top: 5px; font-weight: bold; }
        .badge { position: absolute; top: 8px; left: 8px; background-color: #ff4757; color: white; padding: 3px 8px; font-size: 0.7rem; font-weight: bold; border-radius: 4px; text-transform: uppercase; }
    </style>
</head>
<body>
    <header>
        <div class="logo">🎮 X-Stream</div>
        <nav class="nav-links"><a href="https://crazygames.com" target="_blank">CrazyGames Portal</a></nav>
    </header>
    <div class="container">
        <section class="featured-section">
            <div class="section-title">⚡ Play Now: Survival Race 3D</div>
            <div class="game-window">
                <div class="game-ui-overlay">
                    <div>SCORE: <span id="uiDistance">0</span></div>
                    <div>SPEED: <span id="uiSpeed">0</span> km/h</div>
                </div>
                <div class="start-screen" id="menuScreen">
                    <h2 style="color: #fff; margin-bottom: 20px; letter-spacing: 2px;">SURVIVAL RACE</h2>
                    <button class="start-btn" onclick="startGame()">Start Run</button>
                    <div class="controls-hint">Controls: A / D or Left / Right Arrows</div>
                </div>
                <canvas id="gameCanvas" width="800" height="450"></canvas>
            </div>
        </section>
        <section>
            <div class="section-title">🔥 Trending Portal Hub</div>
            <div class="games-grid">
                <div class="game-card" onclick="window.scrollTo({top: 0, behavior: 'smooth'}); startGame();">
                    <span class="badge">Live</span>
                    <div class="thumb-placeholder">🏎️</div>
                    <div class="game-info"><div class="game-title">Survival Race 3D</div><div class="game-tag">Racing</div></div>
                </div>
                <a href="https://poki.com" target="_blank" class="game-card">
                    <div class="thumb-placeholder">🏹</div>
                    <div class="game-info"><div class="game-title">Poki Portal</div><div class="game-tag">Action</div></div>
                </a>
                <a href="https://crazygames.com" target="_blank" class="game-card">
                    <div class="thumb-placeholder">🧱</div>
                    <div class="game-info"><div class="game-title">CrazyGames Hub</div><div class="game-tag">Sandbox</div></div>
                </a>
            </div>
        </section>
    </div>
<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const uiDistance = document.getElementById('uiDistance');
    const uiSpeed = document.getElementById('uiSpeed');
    const menuScreen = document.getElementById('menuScreen');
    let gameRunning = false, playerX = 0, speed = 0, distance = 0, keys = {}, obstacles = [], spawnTimer = 0;
    window.addEventListener('keydown', e => { if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)) e.preventDefault(); keys[e.key] = true; });
    window.addEventListener('keyup', e => keys[e.key] = false);
    function startGame() { menuScreen.style.display = 'none'; gameRunning = true; playerX = 0; speed = 7; distance = 0; obstacles = []; spawnTimer = 0; loop(); }
    function loop() { if (!gameRunning) return; updateMechanics(); renderGraphics(); requestAnimationFrame(loop); }
    function updateMechanics() {
        distance += 1; uiDistance.textContent = distance; uiSpeed.textContent = Math.floor(speed * 22);
        if (keys['ArrowLeft'] || keys['a'] || keys['A']) playerX -= 6;
        if (keys['ArrowRight'] || keys['d'] || keys['D']) playerX += 6;
        if (playerX < -170) playerX = -170; if (playerX > 170) playerX = 170;
        spawnTimer++;
        if (spawnTimer > 25) { obstacles.push({ x: (Math.random() * 340) - 170, y: 0, size: 1 }); spawnTimer = 0; if(distance > 500) speed = 9; if(distance > 1200) speed = 12; }
        for (let i = obstacles.length - 1; i >= 0; i--) {
            let obs = obstacles[i]; obs.y += speed; obs.size += 0.3;
            if (obs.y > 210 && obs.y < 250) {
                let obsPageX = (canvas.width / 2) + obs.x * (obs.y / 70), playerPageX = (canvas.width / 2) + playerX;
                if (Math.abs(playerPageX - obsPageX) < 35) gameOver();
            }
            if (obs.y > 300) obstacles.splice(i, 1);
        }
    }
    function renderGraphics() {
        ctx.fillStyle = '#0b0c10'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        let horizonY = 140; ctx.fillStyle = '#0f1015'; ctx.fillRect(0, 0, canvas.width, horizonY);
        ctx.fillStyle = '#1f2833'; ctx.beginPath(); ctx.moveTo(canvas.width / 2 - 30, horizonY); ctx.lineTo(canvas.width / 2 + 30, horizonY); ctx.lineTo(canvas.width / 2 + 280, canvas.height); ctx.lineTo(canvas.width / 2 - 280, canvas.height); ctx.closePath(); ctx.fill();
        obstacles.forEach(obs => { let cx = (canvas.width / 2) + obs.x * (obs.y / 70), cy = horizonY + obs.y; ctx.fillStyle = '#ff4757'; ctx.beginPath(); ctx.arc(cx, cy, obs.size * 1.8, 0, Math.PI * 2); ctx.fill(); });
        let pScreenX = (canvas.width / 2) + playerX, pScreenY = 370;
        ctx.fillStyle = '#66fcf1'; ctx.fillRect(pScreenX - 18, pScreenY, 36, 12);
        ctx.fillStyle = '#45a29e'; ctx.fillRect(pScreenX - 8, pScreenY - 8, 16, 8);
    }
    function gameOver() { gameRunning = false; menuScreen.style.display = 'flex'; menuScreen.querySelector('h2').innerHTML = `💥 CRASHED! 💥<br><span style="font-size:1.1rem; color:#45a29e;">Score: ${distance}</span>`; menuScreen.querySelector('button').textContent = "Play Again"; }
    renderGraphics();
</script>
</body>
</html>
